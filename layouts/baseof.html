<!doctype html>
<html
  lang="{{ site.Language.LanguageCode }}"
  dir="{{ or site.Language.LanguageDirection `ltr` }}"
>
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="dark:bg-gray-900">
    <div>
      <header
        class="absolute inset-x-0 top-0 z-40 h-[90px] w-full bg-transparent"
      >
        {{ partial "header.html" . }}
      </header>
    </div>
    <div class="z-20">
      <main>
        {{ block "main" . }}{{ end }}
      </main>
    </div>
    <div class="dark:bg-gray-950">
      <footer
        class="grid grid-cols-6 md:grid-cols-12 mx-3 md:mx-10 relative lg:gap-10 gap-6 pt-14 lg:pt-20 pb-14 lg:pb-20"
      >
        {{ partial "footer.html" . }}
      </footer>
    </div>
  </body>
</html>
