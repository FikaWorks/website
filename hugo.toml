baseURL = 'https://fika.works/'
languageCode = 'en-US'
title = 'FikaWorks'

disableKinds = ["taxonomy", "term"]
enableRobotsTXT = true

[params]
description = "We design and deliver modular, enterprise-grade cloud solutions that integrate seamlessly with major providers such as Azure, AWS, and Google Cloud as well as Sovereign Neo-Cloud. By applying modern cloud-native engineering practices, we help businesses scale efficiently, operate securely, and innovate faster—turning complex challenges into sustainable competitive advantage."
twitter_handler = "@fikaworks"

[taxonomies]
category = "categories"
tag = "tags"

[markup.goldmark.parser.attribute]
block = true

[outputs]
page = ["HTML"]
home = ["HTML"]
section = ["HTML", "RSS"]
taxonomy = ["HTML"]

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
anchorLineNos = true
codeFences = true
guessSyntax = false
hl_Lines = ""
lineAnchors = ""
lineNoStart = 1
lineNos = false
lineNumbersInTable = true
noClasses = true
style = "catppuccin-mocha"
tabWidth = 2

